name: Retire Supabase development project

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: "Type DELETE_DOONGDOONG_DEV to permanently delete the retired project"
        required: true
        type: string

permissions:
  contents: read

jobs:
  delete-project:
    if: inputs.confirm == 'DELETE_DOONGDOONG_DEV'
    environment: development
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
      VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
    steps:
      - name: Verify the exact retired project
        run: |
          set -euo pipefail
          expected_ref="xqzcqfdgahvtfrhcpxco"
          expected_name="DoongDoong Dev"
          test -n "$SUPABASE_ACCESS_TOKEN"
          test "$SUPABASE_PROJECT_REF" = "$expected_ref"
          test "$VITE_SUPABASE_URL" = "https://${expected_ref}.supabase.co"

          curl --fail-with-body --silent --show-error \
            "https://api.supabase.com/v1/projects/${expected_ref}" \
            --header "Authorization: Bearer ${SUPABASE_ACCESS_TOKEN}" \
            --output "$RUNNER_TEMP/project.json"
          jq --exit-status \
            --arg ref "$expected_ref" \
            --arg name "$expected_name" \
            '.id == $ref and .name == $name' \
            "$RUNNER_TEMP/project.json" > /dev/null

      - name: Permanently delete the retired development project
        run: |
          set -euo pipefail
          curl --fail-with-body --silent --show-error \
            --request DELETE \
            "https://api.supabase.com/v1/projects/${SUPABASE_PROJECT_REF}" \
            --header "Authorization: Bearer ${SUPABASE_ACCESS_TOKEN}" \
            --output "$RUNNER_TEMP/deleted-project.json"
          jq --exit-status \
            --arg ref "$SUPABASE_PROJECT_REF" \
            '.ref == $ref or .id == $ref' \
            "$RUNNER_TEMP/deleted-project.json" > /dev/null
