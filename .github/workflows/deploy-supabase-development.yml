name: Deploy Supabase development

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: "Type DEPLOY_DEVELOPMENT to update the isolated development project"
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: supabase-development
  cancel-in-progress: false

jobs:
  deploy:
    if: inputs.confirm == 'DEPLOY_DEVELOPMENT'
    environment: development
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - uses: supabase/setup-cli@v1
        with:
          version: 2.109.1
      - run: node scripts/check-migrations.mjs
      - name: Verify development deployment credentials
        run: |
          test -n "$SUPABASE_ACCESS_TOKEN"
          test -n "$SUPABASE_PROJECT_REF"
          test -n "$SUPABASE_DB_PASSWORD"
      - run: supabase link --project-ref "$SUPABASE_PROJECT_REF"
      - name: Apply development database migrations
        run: supabase db push --include-all
      - name: Deploy authenticated development Edge Functions
        run: >-
          supabase functions deploy
          send-message delete-account translate-message dispatch-web-push
          --project-ref "$SUPABASE_PROJECT_REF" --use-api
      - name: Deploy Naver userinfo adapter
        run: >-
          supabase functions deploy naver-userinfo
          --project-ref "$SUPABASE_PROJECT_REF" --use-api --no-verify-jwt
