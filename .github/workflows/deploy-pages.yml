name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    environment: production
    runs-on: ubuntu-latest
    env:
      VITE_DEPLOYMENT_ENV: production
      VITE_PUBLIC_APP_URL: ${{ vars.VITE_PUBLIC_APP_URL || 'https://sorryrlrud.github.io/DoongDoong/' }}
      VITE_BASE_PATH: ${{ vars.VITE_BASE_PATH || '/DoongDoong/' }}
      VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
      VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
      VITE_VAPID_PUBLIC_KEY: ${{ secrets.VITE_VAPID_PUBLIC_KEY }}
      SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      # Do not replace the currently live Pages bundle with one that calls the
      # Edge sender until the separately dispatched Phase 1 backend release has
      # completed. A failed probe leaves the previous Pages deployment live.
      - name: Verify phase-one backend before shipping the Edge client
        run: |
          set -euo pipefail
          test -n "$VITE_SUPABASE_URL"
          test -n "$VITE_SUPABASE_PUBLISHABLE_KEY"
          base_url="${VITE_SUPABASE_URL%/}"
          web_origin="$(node --input-type=module -e \
            'console.log(new URL(process.env.VITE_PUBLIC_APP_URL).origin)')"

          edge_status="$(curl --silent --show-error --output /dev/null --write-out '%{http_code}' \
            --request OPTIONS "$base_url/functions/v1/send-message" \
            --header "Origin: $web_origin")"
          if [ "$edge_status" != '200' ]; then
            echo "Phase-one send-message Edge endpoint is not ready (HTTP $edge_status)."
            exit 1
          fi

          account_merge_status="$(curl --silent --show-error --output /dev/null --write-out '%{http_code}' \
            --request OPTIONS "$base_url/functions/v1/account-merge" \
            --header "Origin: $web_origin")"
          if [ "$account_merge_status" != '200' ]; then
            echo "Account-merge Edge endpoint is not ready (HTTP $account_merge_status)."
            exit 1
          fi

          contract_file="$(mktemp)"
          trap 'rm -f "$contract_file"' EXIT
          contract_status="$(curl --silent --show-error --output "$contract_file" --write-out '%{http_code}' \
            --request POST "$base_url/rest/v1/rpc/ocean_pwa_contract_status" \
            --header "apikey: $VITE_SUPABASE_PUBLISHABLE_KEY")"
          if [ "$contract_status" != '200' ]; then
            echo "Phase-one database contract is not ready (HTTP $contract_status)."
            exit 1
          fi

          CONTRACT_FILE="$contract_file" node --input-type=module <<'NODE'
          import { readFile } from 'node:fs/promises';

          const status = JSON.parse(await readFile(process.env.CONTRACT_FILE, 'utf8'));
          if (status?.sendMessage !== 'edge-v1') {
            throw new Error('The deployed database does not advertise the Edge send contract.');
          }
          NODE

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build:prod

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    permissions:
      pages: write
      id-token: write
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
