name: Audit production migration baseline

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  audit:
    environment: production
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - uses: supabase/setup-cli@v1
        with:
          version: 2.109.1
      - run: supabase link --project-ref "$SUPABASE_PROJECT_REF"
      - name: Compare the historical migration schema with production
        run: |
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/post-baseline-migrations"
          for migration in supabase/migrations/*.sql; do
            version="$(basename "$migration" | cut -d_ -f1)"
            if [ "$version" -ge 202607210001 ]; then
              mv "$migration" "$RUNNER_TEMP/post-baseline-migrations/"
            fi
          done

          supabase db diff \
            --from migrations \
            --to linked \
            --schema public \
            --output "$RUNNER_TEMP/production-baseline.diff.sql"

          bytes="$(wc -c < "$RUNNER_TEMP/production-baseline.diff.sql" | tr -d ' ')"
          echo "Schema diff size: ${bytes} bytes" >> "$GITHUB_STEP_SUMMARY"
      - name: Upload the schema-only diff
        uses: actions/upload-artifact@v4
        with:
          name: production-baseline-schema-diff
          path: ${{ runner.temp }}/production-baseline.diff.sql
          if-no-files-found: error
          retention-days: 1
