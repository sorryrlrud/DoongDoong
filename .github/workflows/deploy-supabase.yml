name: Deploy Supabase phase-one compatibility contract

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: "Type DEPLOY to apply the reviewed migration and Edge Functions"
        required: true
        type: string
      baseline:
        description: "Type BASELINE_VERIFIED after a reviewed schema diff and migration repair"
        required: true
        type: string
      phase:
        description: "Type COMPATIBILITY_RELEASE to retain cached-client RPC support"
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: supabase-production
  cancel-in-progress: false

jobs:
  deploy:
    if: inputs.confirm == 'DEPLOY' && inputs.baseline == 'BASELINE_VERIFIED' && inputs.phase == 'COMPATIBILITY_RELEASE'
    environment: production
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - uses: supabase/setup-cli@v1
        with:
          version: 2.109.1
      - run: node scripts/check-migrations.mjs
      - name: Verify deployment credentials
        run: |
          test -n "$SUPABASE_ACCESS_TOKEN"
          test -n "$SUPABASE_PROJECT_REF"
      - run: supabase link --project-ref "$SUPABASE_PROJECT_REF"
      - name: Verify repaired migration baseline
        run: node scripts/verify-remote-migration-baseline.mjs
      - name: Phase 1 — deploy compatible Edge endpoints before the database contract
        run: >-
          supabase functions deploy send-message delete-account dispatch-web-push
          --project-ref "$SUPABASE_PROJECT_REF" --use-api
      - name: Phase 1 — apply the database contract while the legacy sender remains enabled
        run: supabase db push --include-all
      - name: Phase 1 — deploy translation after its queue contract exists
        run: >-
          supabase functions deploy translate-message
          --project-ref "$SUPABASE_PROJECT_REF" --use-api
      - name: Handoff to the Pages release
        run: |
          {
            echo "### Phase-one backend is ready"
            echo "Deploy the matching Pages commit next. The Pages workflow probes both the Edge endpoint and database contract before it can replace the live client."
            echo "Do not run the legacy sender revoke workflow until the documented cache and telemetry window has elapsed."
          } >> "$GITHUB_STEP_SUMMARY"
