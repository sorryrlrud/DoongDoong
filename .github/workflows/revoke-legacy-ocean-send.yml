name: Revoke legacy Ocean sender

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: "Type REVOKE_LEGACY_SEND after the 30-day Pages compatibility window"
        required: true
        type: string
      evidence:
        description: "Type PAGES_AND_TELEMETRY_VERIFIED after recording the runbook evidence"
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: supabase-production
  cancel-in-progress: false

jobs:
  revoke:
    if: inputs.confirm == 'REVOKE_LEGACY_SEND' && inputs.evidence == 'PAGES_AND_TELEMETRY_VERIFIED'
    environment: production
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
    steps:
      - uses: actions/checkout@v4
      - uses: supabase/setup-cli@v1
        with:
          version: 2.109.1
      - name: Verify deployment credentials
        run: |
          test -n "$SUPABASE_ACCESS_TOKEN"
          test -n "$SUPABASE_PROJECT_REF"
      - run: supabase link --project-ref "$SUPABASE_PROJECT_REF"
      - name: Display aggregate compatibility telemetry
        run: >-
          supabase db query --linked
          "select phase_one_applied_at, legacy_last_called_at, legacy_call_count, legacy_revoked_at
          from private.ocean_legacy_sender_cutover where singleton"
      - name: Revoke the cached-client compatibility sender
        run: >-
          supabase db query --linked
          --file supabase/manual/202607220001_revoke_legacy_ocean_send_message.sql
