name: Deploy development release

on:
  push:
    branches:
      - develop
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: development-release
  cancel-in-progress: true

jobs:
  build-and-deploy:
    environment: development
    runs-on: ubuntu-latest
    env:
      VITE_DEPLOYMENT_ENV: development
      VITE_PUBLIC_APP_URL: ${{ vars.VITE_PUBLIC_APP_URL }}
      VITE_BASE_PATH: ${{ vars.VITE_BASE_PATH }}
      VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
      VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
      VITE_VAPID_PUBLIC_KEY: ${{ secrets.VITE_VAPID_PUBLIC_KEY }}
      SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify development backend contract
        run: |
          set -euo pipefail
          test -n "$VITE_SUPABASE_URL"
          test -n "$VITE_SUPABASE_PUBLISHABLE_KEY"
          base_url="${VITE_SUPABASE_URL%/}"
          web_origin="$(node --input-type=module -e \
            'console.log(new URL(process.env.VITE_PUBLIC_APP_URL).origin)')"

          edge_status="$(curl --silent --show-error --output /dev/null --write-out '%{http_code}' \
            --request OPTIONS "$base_url/functions/v1/send-message" \
            --header "Origin: $web_origin")"
          if [ "$edge_status" != '200' ]; then
            echo "Development send-message endpoint is not ready (HTTP $edge_status)."
            exit 1
          fi

          contract_file="$(mktemp)"
          trap 'rm -f "$contract_file"' EXIT
          contract_status="$(curl --silent --show-error --output "$contract_file" --write-out '%{http_code}' \
            --request POST "$base_url/rest/v1/rpc/ocean_pwa_contract_status" \
            --header "apikey: $VITE_SUPABASE_PUBLISHABLE_KEY")"
          if [ "$contract_status" != '200' ]; then
            echo "Development database contract is not ready (HTTP $contract_status)."
            exit 1
          fi

          CONTRACT_FILE="$contract_file" node --input-type=module <<'NODE'
          import { readFile } from 'node:fs/promises';

          const status = JSON.parse(await readFile(process.env.CONTRACT_FILE, 'utf8'));
          if (status?.sendMessage !== 'edge-v1') {
            throw new Error('The development database does not advertise the Edge send contract.');
          }
          NODE

      - name: Verify application
        run: npm run lint && npm run test

      - name: Build isolated development bundle
        run: npm run build:dev

      - name: Upload development bundle
        uses: actions/upload-artifact@v4
        with:
          name: doongdoong-development-${{ github.sha }}
          path: dist
          if-no-files-found: error
          retention-days: 14

      - name: Verify development Pages deploy key
        env:
          DEV_PAGES_DEPLOY_KEY: ${{ secrets.DEV_PAGES_DEPLOY_KEY }}
        run: test -n "$DEV_PAGES_DEPLOY_KEY"

      - name: Publish development Pages bundle
        env:
          DEV_PAGES_DEPLOY_KEY: ${{ secrets.DEV_PAGES_DEPLOY_KEY }}
        run: |
          set -euo pipefail

          install -m 700 -d "$HOME/.ssh"
          deploy_key="$HOME/.ssh/doongdoong-dev-pages"
          printf '%s\n' "$DEV_PAGES_DEPLOY_KEY" > "$deploy_key"
          chmod 600 "$deploy_key"
          ssh-keyscan -H github.com >> "$HOME/.ssh/known_hosts"

          export GIT_SSH_COMMAND="ssh -i $deploy_key -o IdentitiesOnly=yes"
          touch dist/.nojekyll
          git -C dist init --initial-branch=main
          git -C dist config user.name github-actions[bot]
          git -C dist config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git -C dist add --all
          git -C dist commit --message "Deploy development ${GITHUB_SHA}"
          git -C dist remote add origin git@github.com:sorryrlrud/DoongDoong-dev.git
          git -C dist push --force origin main
